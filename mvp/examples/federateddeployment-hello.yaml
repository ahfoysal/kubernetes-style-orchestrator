apiVersion: federation.mk.io/v1
kind: FederatedDeployment
metadata:
  name: hello
spec:
  # Empty clusters list => fan out to every registered cluster.
  clusters: []
  template:
    replicas: 2
    selector:
      app: hello
    template:
      metadata:
        labels:
          app: hello
      spec:
        containers:
          - name: hello
            image: alpine:3.20
            ports:
              - containerPort: 8080
